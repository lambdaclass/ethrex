[package]
name = "ethrex-zkevm-bench"
version = "0.1.0"
edition = "2024"
authors = ["LambdaClass"]
license = "MIT OR Apache-2.0"

# Standalone workspace: this tool hard-depends on zisk (lib-c), which is
# x86-64-only, so it is excluded from the root workspace and carries its own
# Cargo.lock. Dependencies are declared concretely rather than inherited.
[workspace]

[dependencies]
ethrex-common = { path = "../../crates/common", default-features = false }
ethrex-config = { path = "../../crates/common/config" }
ethrex-rlp = { path = "../../crates/common/rlp" }
ethrex-prover = { path = "../../crates/prover", default-features = false, features = ["zisk"] }
ethrex-guest-program = { path = "../../crates/guest-program", default-features = false, features = ["zisk"] }
ef_tests-blockchain = { path = "../ef_tests/blockchain", features = ["zisk"] }

clap = { version = "4.3", features = ["derive"] }
serde = { version = "1.0.203", features = ["derive"] }
serde_json = "1.0.117"
toml = "0.8"
flate2 = "1.0"
eyre = "0.6"
sha2 = "0.10"
hex = "0.4"
bytes = { version = "1.6.0", features = ["serde"] }
tokio = { version = "1.41.1", default-features = false, features = ["rt-multi-thread"] }

[features]
zisk-elf = ["ethrex-guest-program/zisk-build-elf", "ethrex-guest-program/ci"]

[[bin]]
name = "ethrex-zkevm-bench"
path = "src/main.rs"

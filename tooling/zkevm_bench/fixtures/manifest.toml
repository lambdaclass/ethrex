# zkEVM execution benchmark workload manifest.
#
# Real-block workloads reference committed gzipped ethrex-replay `Cache`
# fixtures under fixtures/blocks/ (curated from mainnet to span the AIR-cost
# spectrum and different dominant cost components). Micro workloads reference
# in-repo EEST zkevm fixtures under ../ef_tests/blockchain/vectors_zkevm/, which
# are downloaded (gitignored) test data — run `make zkevm-vectors` in
# tooling/ef_tests/blockchain first. All `source` paths are relative to the
# crate dir (tooling/zkevm_bench), which is the intended run cwd.
#
# `category` records the block's cost character (from the curation ziskemu pass):
#   light/small/typical = cost tier; compute = high MAIN/OPCODES, low precompiles;
#   memory = highest memory fraction; tx-heavy = most transactions;
#   large-state = biggest witness/state footprint.

[[workload]]
name = "mainnet_25087668_light"
type = "real-block"
category = "light"
source = "fixtures/blocks/cache_mainnet_25087668.json.gz"


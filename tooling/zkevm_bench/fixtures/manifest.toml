# zkEVM execution benchmark workload manifest.
#
# Workload sources:
#  - real-block: committed gzipped ethrex-replay `Cache` fixtures under
#    fixtures/blocks/ (curated mainnet blocks spanning the AIR-cost spectrum).
#  - micro: in-repo EEST zkevm fixtures under ../ef_tests/blockchain/vectors_zkevm/
#    (gitignored downloaded data — run `make zkevm-vectors` in
#    tooling/ef_tests/blockchain first).
#  - stress: worst-case EEST benchmark blocks (compute/memory/keccak/state/
#    precompiles at 150M gas), committed gzipped in `Cache` format under
#    fixtures/stress/. Generated via `generate-stress` from the
#    execution-specs `tests-benchmark` release using ethrex's own witness
#    generation. This committed set is one representative per category group;
#    the exhaustive set is generated on demand for `--mode slow --stress-dir`.
#
# All `source` paths are relative to this manifest file's own directory
# (tooling/zkevm_bench/fixtures/), not the process cwd — `run` resolves them
# against wherever `--workloads` points, so the binary can be invoked from
# any cwd. `tier` sets which run mode includes a workload: quick ⊆ medium ⊆
# slow; absent `tier` means medium.

# ---- real mainnet blocks (cost spectrum) ----
[[workload]]

# ---- EEST micro (needs `make zkevm-vectors`) ----
# tier = medium (not quick): micro needs `make zkevm-vectors` (a download), so
# keeping it out of quick lets `--mode quick` run committed-only, zero-setup.
[[workload]]
name = "eest_amsterdam_witness_7702_delegation_chain"
type = "micro"
category = "witness"
source = "../../ef_tests/blockchain/vectors_zkevm/eest/for_amsterdam/amsterdam/eip8025_optional_proofs/witness_7702/witness_codes_delegation_chain.json"


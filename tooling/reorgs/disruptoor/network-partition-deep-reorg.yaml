# Deep-reorg partition scenario for ethrex
#
# Purpose:
#   Drive a deep reorg by partitioning the network into two halves for ~200
#   slots. The minority side (ethrex) builds a fork that diverges more than
#   128 blocks from the majority chain; on heal, ethrex must accept the longer
#   chain without returning TooDeepReorg.
#
# Prerequisites:
#   - Kurtosis CLI installed (https://docs.kurtosis.com/install)
#   - Docker daemon running
#   - ethrex Docker image built and tagged as ethrex:local
#       docker build -t ethrex:local .
#
# How to run (manual only -- not a PR gate):
#   kurtosis run --enclave deep-reorg \
#     github.com/ethpandaops/ethereum-package \
#     --args-file tooling/reorgs/disruptoor/network-partition-deep-reorg.yaml
#
# To tear down:
#   kurtosis enclave rm deep-reorg --force
#
# Note: this scenario is gated behind workflow_dispatch in CI
#   (.github/workflows/deep_reorg.yaml). It does NOT run on every PR.

participants:
  # Majority partition: 3 geth nodes. PeerDAS / Fulu needs either a supernode
  # or one node with 128+ validators; we make the first majority node a
  # supernode and give it 128 validators to satisfy both paths.
  #
  # Note: reth (v2.x) hits MDBX "Remote I/O error (121)" on hosts where the
  # underlying Docker storage driver / kernel combo doesn't support MAP_SHARED
  # the way MDBX expects. We use three geths here instead since EL diversity
  # isn't required for a deep-reorg test (we just need a 3-node majority).
  - el_type: geth
    el_image: ethereum/client-go:v1.17.3
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.1.3
    supernode: true
    validator_count: 128

  - el_type: geth
    el_image: ethereum/client-go:v1.17.3
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.1.3
    validator_count: 64

  - el_type: geth
    el_image: ethereum/client-go:v1.17.3
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.1.3
    validator_count: 64

  # Minority partition: 1 ethrex node (built from current branch). Lower
  # validator count means the minority cannot finalize on its own during the
  # partition window; on heal, ethrex must reorg to the majority chain.
  - el_type: ethrex
    el_image: ethrex:local
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.1.3
    validator_count: 32
    el_extra_params:
      - "--http.api=eth,net,web3,debug,admin,txpool"
      - "--metrics"

network_params:
  # 6-second slots; halves real-time test duration vs mainnet's 12s. Below ~4s
  # risks missed attestations in small (~4-node) setups; 6s is the sweet spot
  # for fast iteration while keeping the network stable.
  seconds_per_slot: 6
  deposit_contract_address: "0x4242424242424242424242424242424242424242"

additional_services:
  # disruptoor: network-partition controller
  # Docs: https://github.com/ethpandaops/disruptoor
  - disruptoor
  # dora: beacon-chain explorer UI for visualizing the partition + reorg
  - dora

# Publish stable host ports so dora/disruptoor and the EL/CL endpoints are
# reachable at predictable URLs instead of randomly-assigned ones.
#   - additional_services on 36000+ (dora, disruptoor)
#   - el on 32000+ (JSON-RPC)
#   - cl on 33000+ (beacon API)
# `kurtosis enclave inspect deep-reorg` will list the actual host-side ports.
port_publisher:
  additional_services:
    enabled: true
    public_port_start: 36000
  el:
    enabled: true
    public_port_start: 32000
  cl:
    enabled: true
    public_port_start: 33000

disruptoor_params:
  # The ethereum-package's disruptoor wrapper sets privileged/host-PID/docker-socket
  # mounting internally; only app-level keys are accepted here. Allowed fields:
  # image, min_cpu, max_cpu, min_mem, max_mem, log_level, log_format, config,
  # partitions, shaping, extra_args.
  image: ethpandaops/disruptoor:v1.1.1
  log_level: info
  # Partitions are driven at runtime via HTTP PUT /v1/state from the assertoor
  # scenario; no initial state baked in here.

  # assertoor reads and asserts on this network after partition + heal
assertoor_params:
  image: ethpandaops/assertoor:v0.1.2
  run_stability_check: false
  run_block_proposal_check: false
  tests:
    - file: ./tooling/reorgs/disruptoor/assertions.yaml

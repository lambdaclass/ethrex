[package]
name = "ethrex-prover"
version.workspace = true
edition.workspace = true
authors.workspace = true
documentation.workspace = true
license.workspace = true

[dependencies]
serde_json.workspace = true
serde.workspace = true
bytes.workspace = true
ethereum-types.workspace = true
tokio.workspace = true
tokio-util.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tracing.workspace = true
hex.workspace = true
thiserror.workspace = true
clap.workspace = true
kzg-rs.workspace = true
rkyv.workspace = true
bincode = "1.3.3"
anyhow = "1.0.86"
url.workspace = true

# ethrex
ethrex-common.workspace = true
ethrex-storage.workspace = true
ethrex-vm.workspace = true
ethrex-rlp.workspace = true
ethrex-blockchain.workspace = true

# l2
ethrex-l2 = { path = "../", default-features = false }
ethrex-l2-common = { workspace = true }
ethrex-sdk.workspace = true

ethrex-guest-program = { path = "../../guest-program" }

# Shared prover backend crate
ethrex-prover-backend = { path = "../../prover" }

[dev-dependencies]
ethrex-storage.workspace = true

[lib]
name = "ethrex_prover_lib"
path = "src/lib.rs"

[features]
# TODO(#2662) Prover shouldn't have l2 as a default but cargo complains about missing field in struct
default = ["l2"]
# prover backends - forward to shared crate
risc0 = [
    "ethrex-prover-backend/risc0",
    "ethrex-guest-program/risc0",
    "ethrex-common/risc0",
]
sp1 = ["ethrex-prover-backend/sp1", "ethrex-guest-program/sp1"]
zisk = ["ethrex-prover-backend/zisk", "ethrex-guest-program/zisk"]
openvm = [
    "ethrex-prover-backend/openvm",
    "ethrex-guest-program/openvm",
]
profiling = ["ethrex-prover-backend/profiling"]

gpu = ["ethrex-prover-backend/gpu"]
l2 = ["ethrex-prover-backend/l2", "ethrex-guest-program/l2", "ethrex-l2/l2"]

# temporary feature until we fix cargo-zisk setup-rom from failing in the CI
ci = ["ethrex-prover-backend/ci", "ethrex-guest-program/ci"]

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
indexing_slicing = "deny"
as_conversions = "deny"
unnecessary_cast = "warn"
panic = "deny"
redundant_clone = "warn"

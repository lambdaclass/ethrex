[package]
name = "ethrex-guest-airbender"
version = "9.0.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[dependencies]
airbender = { git = "https://github.com/matter-labs/airbender-platform.git", package = "airbender-sdk", features = ["std", "crypto"] }
sha2 = "0.10.9"
rkyv = { version = "0.8.10", features = ["std", "unaligned"] }

ethrex-guest-program = { path = "../../", default-features = false, features = ["airbender"] }
ethrex-vm = { path = "../../../vm", default-features = false }
ethrex-common = { path = "../../../common", default-features = false }

[features]
l2 = ["ethrex-guest-program/l2"]

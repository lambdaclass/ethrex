[package]
name = "ethrex-rlp"
version.workspace = true
edition.workspace = true
authors.workspace = true
documentation.workspace = true
license.workspace = true
description = "RLP encoding and decoding for the ethrex Ethereum execution client"
repository.workspace = true

[dependencies]
thiserror = { version = "2.0.9", default-features = false }
bytes = { version = "1.6.0", default-features = false }
ethereum-types = { version = "0.15.1", default-features = false, features = ["ethbloom"] }

[dev-dependencies]
hex-literal.workspace = true
criterion = { version = "0.7.0", features = ["html_reports"] }
# Path-only (no version) on purpose: these are bench-only dev-deps on crates that
# publish AFTER ethrex-rlp. A versioned dev-dep would make `cargo publish` require
# them from crates.io before they exist (ethrex-rlp is the first crate published).
# Path-only dev-deps are stripped from the published manifest.
ethrex-common = { path = ".." }
ethrex-trie = { path = "../trie" }
rand = "0.9.2"
once_cell = "1"


[lib]
path = "./rlp.rs"

[lints]
workspace = true

[[bench]]
name = "decode"
harness = false

[[bench]]
name = "encode"
harness = false

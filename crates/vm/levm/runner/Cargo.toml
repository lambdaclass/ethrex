[package]
name = "runner"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
ethrex-levm = { path = "../" }
ethrex-vm.workspace = true
ethrex-common.workspace = true
# blst enables the host BLS12-381 (EIP-2537) backend for blocks that hit the
# BLS precompiles (otherwise the no-backend trait default returns an error).
ethrex-crypto = { workspace = true, features = ["blst"] }
ethrex-storage.workspace = true
ethrex-blockchain.workspace = true
hex.workspace = true
bytes.workspace = true
serde = { workspace = true, features = ["derive", "rc"] }
serde_json.workspace = true
clap.workspace = true
log = "0.4.27"
env_logger = "0.11.8"
num-bigint = "0.4.6"
num-traits = "0.2.19"
rustc-hash.workspace = true

[lints]
workspace = true

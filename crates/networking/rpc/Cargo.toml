[package]
name = "ethrex-rpc"
version.workspace = true
edition.workspace = true
authors.workspace = true
documentation.workspace = true
license.workspace = true
description = "JSON-RPC and Engine API server for the ethrex Ethereum execution client"
repository.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# "http2" is required so `axum::serve` serves HTTP/2 cleartext (h2c) on the
# authrpc port: the engine REST/SSZ API (execution-apis #793) mandates HTTP/2,
# and CLs like consensoor connect with h2c prior-knowledge and do NOT fall back
# to HTTP/1.1. Without this feature h2c serving would only work incidentally via
# reqwest's feature unification — declare it explicitly so it can't regress.
axum = { features = ["ws", "http2"], workspace = true }
tower-http.workspace = true
serde.workspace = true
serde_json = "1.0.117"
tokio = { workspace = true, features = ["full"] }
bytes.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
ethrex-common.workspace = true
ethrex-storage.workspace = true
ethrex-vm.workspace = true
ethrex-blockchain.workspace = true
ethrex-metrics.workspace = true
ethrex-crypto.workspace = true
ethrex-p2p = { workspace = true, features = ["test-utils"] }
ethrex-rlp.workspace = true
ethrex-trie.workspace = true
ethrex-storage-rollup = { workspace = true, optional = true }
ethrex-l2-common = { workspace = true, optional = true }
ethereum-types.workspace = true
hex.workspace = true
axum-extra = { version = "0.10.0", features = ["typed-header"] }
jsonwebtoken.workspace = true
rand.workspace = true
tokio-util = { workspace = true, features = ["codec"] }
reqwest.workspace = true
sha2.workspace = true
jemalloc_pprof = { version = "0.8.0", optional = true, features = [
    "flamegraph",
    "symbolize",
] }
spawned-rt.workspace = true
spawned-concurrency.workspace = true
# Used by test_utils to share a single merkleization pool across test contexts.
rayon.workspace = true

# EIP-8025 dependencies
libssz = { workspace = true }
# libssz-merkle provides the `HashTreeRoot` trait used by the SSZ derives
# in engine_rest/types/. The libssz-derive macros expand to impls that
# reference this trait, so it must be a direct unconditional dep.
libssz-merkle = { workspace = true }
libssz-derive = { workspace = true }
libssz-types = { workspace = true }

# Clients
envy = "0.4.2"
thiserror.workspace = true
secp256k1.workspace = true
uuid.workspace = true
hex-literal = "0.4.1"

http-body-util = "0.1"

[dev-dependencies]
hex-literal = "0.4.1"
tower = "0.5"
criterion = { version = "0.5", features = ["html_reports"] }
rand = "0.8"

[lib]
path = "./lib.rs"

[lints.clippy]
unwrap_used = "deny"
redundant_clone = "warn"

[features]
jemalloc_profiling = ["dep:jemalloc_pprof"]
eip-8025 = ["ethrex-blockchain/eip-8025", "ethrex-common/eip-8025"]
# Exposes the `test_utils` module (test scaffolding) to other crates' test
# builds. Off by default so it is excluded from the published library.
test-utils = []

[[bench]]
name = "engine_transport"
harness = false

services:
  node1:
    build:
      context: ../..
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command:
      - --network
      - /genesis.json
      - --p2p.addr
      - "0.0.0.0"
      - --p2p.port
      - "30303"
      - --discovery.port
      - "30303"
      - --http.port
      - "8545"
      - --datadir
      - /data
      - --bootnodes
      - "${BOOTNODES_FOR_NODE1}"
    volumes:
      - ./genesis.json:/genesis.json:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./nodekeys/node1.key:/node.key:ro
    networks:
      discovery-net:
        ipv4_address: 10.55.0.10
    healthcheck:
      test: ["CMD", "pidof", "ethrex"]
      interval: 2s
      timeout: 2s
      retries: 30

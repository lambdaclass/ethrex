participants:
- cl_type: lighthouse
  cl_image: ethpandaops/lighthouse:bal-devnet-4
  el_type: ethrex
  el_image: ethrex:local
  el_extra_params:
  - --mempool.maxsize=200000
  - --syncmode=full
  count: 1
  supernode: true
ethereum_genesis_generator_params:
  image: ethpandaops/ethereum-genesis-generator:6.0.2
global_log_level: debug
network_params:
  preset: minimal
  seconds_per_slot: 3
  genesis_delay: 30
  fulu_fork_epoch: 0
  gloas_fork_epoch: 2
  # Elevated gas limit to stress-fill blocks
  genesis_gaslimit: 100000000
  gas_limit: 100000000
snooper_enabled: false
additional_services: [dora, spamoor]
dora_params:
  image: ethpandaops/dora:eip7928-support
spamoor_params:
  image: ethpandaops/spamoor:master
  spammers:
  # --- High-rate transfers (fill gas budget cheaply, BAL balance entries) ---
  - scenario: eoatx
    config:
      funding_gas_limit: 100000
      throughput: 400
      max_pending: 8000
      max_wallets: 1500
  # --- Heavy compute (large gas per tx, stresses exec parallelism) ---
  - scenario: gasburnertx
    config:
      funding_gas_limit: 100000
      throughput: 80
      max_pending: 2000
      max_wallets: 300
      gas_units: 500000
  # --- Storage spam (many SSTORE/SLOAD per tx, wide BAL storage_changes) ---
  - scenario: storagespam
    config:
      funding_gas_limit: 100000
      throughput: 80
      max_pending: 2000
      max_wallets: 300
  # --- ERC20 token transfers (shared contract = contention between txs) ---
  - scenario: erc20tx
    config:
      funding_gas_limit: 100000
      throughput: 150
      max_pending: 3000
      max_wallets: 500
  # --- Contract creation (code changes in BAL, exercises code path) ---
  - scenario: deploytx
    config:
      funding_gas_limit: 100000
      throughput: 30
      max_pending: 500
      max_wallets: 150
  # --- Uniswap swaps (realistic DeFi, heavy storage + contention) ---
  - scenario: uniswap-swaps
    config:
      funding_gas_limit: 100000
      throughput: 60
      max_pending: 1500
      max_wallets: 200
  # --- EIP-7702 setcode (code_changes entries, delegation indicators) ---
  - scenario: setcodetx
    config:
      funding_gas_limit: 100000
      throughput: 30
      max_pending: 500
      max_wallets: 150
  # --- Storage refund (large slot writes + zeroing, stresses storage_changes) ---
  - scenario: storagerefundtx
    config:
      funding_gas_limit: 100000
      throughput: 30
      max_pending: 500
      max_wallets: 150
      slots_per_call: 500
port_publisher:
  additional_services:
    enabled: true
    public_port_start: 64400

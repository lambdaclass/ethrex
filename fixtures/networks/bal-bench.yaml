participants:
- cl_type: lighthouse
  cl_image: ethpandaops/lighthouse:bal-devnet-3
  el_type: ethrex
  el_image: ethrex:local
  count: 1
  supernode: true
ethereum_genesis_generator_params:
  image: ethpandaops/ethereum-genesis-generator:5.3.1
global_log_level: debug
network_params:
  preset: minimal
  seconds_per_slot: 6
  genesis_delay: 30
  fulu_fork_epoch: 0
  gloas_fork_epoch: 2
snooper_enabled: false
dora_params:
  image: ethpandaops/dora:eip7928-support
spamoor_params:
  image: ethpandaops/spamoor:latest
  spammers:
  - scenario: eoatx
    config: {throughput: 15}
  - scenario: evm-fuzz
    config: {throughput: 8}
  - scenario: deploytx
    config:
      throughput: 1
      bytecodes: ''

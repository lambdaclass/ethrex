participants:
- cl_type: lodestar
  cl_image: ethpandaops/lodestar:bal-devnet-3
  el_type: ethrex
  el_image: ethrex:local
  el_extra_params:
  - --mempool.maxsize=50000
  - --syncmode=full
  count: 1
  supernode: true
ethereum_genesis_generator_params:
  image: ethpandaops/ethereum-genesis-generator:5.3.1
global_log_level: debug
network_params:
  preset: minimal
  seconds_per_slot: 6
  genesis_delay: 30
  fulu_fork_epoch: 0
  gloas_fork_epoch: 2
  # Mainnet gas limit as of March 2026
  gas_limit: 60000000
snooper_enabled: false
additional_services: [dora, spamoor]
dora_params:
  image: ethpandaops/dora:eip7928-support
spamoor_params:
  image: ethpandaops/spamoor:latest
  spammers:
  # ~70% simple transfers (dominant on mainnet)
  - scenario: eoatx
    config:
      throughput: 30
      max_pending: 500
      max_wallets: 200
  # ~15% ERC20 token transfers
  - scenario: erc20tx
    config:
      throughput: 6
      max_pending: 200
      max_wallets: 100
  # ~10% DEX swaps
  - scenario: uniswap-swaps
    config:
      throughput: 4
      max_pending: 150
  # ~5% contract deploys
  - scenario: deploytx
    config:
      throughput: 2
      max_pending: 100
port_publisher:
  additional_services:
    enabled: true
    public_port_start: 64400

participants:
  # NOTE: Both erigon and geth work on this example, but they provide wrong nodes information on discovery protocol
  # - el_type: erigon
  #   el_image: ethpandaops/erigon:main-764a2c50
  #   cl_type: lighthouse
  #   cl_image: sigp/lighthouse:v8.0.0-rc.1
  #   validator_count: 32
  # - el_type: reth
  #   el_image: ghcr.io/paradigmxyz/reth:v1.2.2
  #   cl_type: lighthouse
  #   cl_image: sigp/lighthouse:v8.0.0-rc.1
  #   validator_count: 32
  - el_type: besu
    el_image: ethpandaops/besu:main-6d54451
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.1.3
    validator_count: 32
  - el_type: geth
    el_image: ethereum/client-go:v1.17.3
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.1.3
    validator_count: 32
    count: 1
  - el_type: ethrex
    el_image: ethrex:local
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.1.3
    validator_count: 32
    supernode: true
    # snooper_enabled: true
    # Preserve the previous devnet-only RPC behavior after the default RPC
    # hardening: expose admin/debug/txpool so test tooling can hit them.
    # --http.addr is already set to 0.0.0.0 by ethereum-package's ethrex
    # launcher, so we only need to widen the namespace allowlist here.
    el_extra_params:
      - "--http.api=eth,net,web3,debug,admin,txpool"

ethereum_metrics_exporter_enabled: true

additional_services:
  - dora
  - prometheus_grafana
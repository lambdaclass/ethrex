participants:
- cl_type: lighthouse
  cl_image: ethpandaops/lighthouse:bal-devnet-3
  el_type: geth
  el_image: ethpandaops/geth:bal-devnet-3
  el_extra_params:
  - --history.state=0
  - --gcmode=archive
  - --syncmode=full
  count: 1
  supernode: true
# - cl_type: lighthouse
#   cl_image: ethpandaops/lighthouse:bal-devnet-3
#   el_type: besu
#   el_image: ethpandaops/besu:bal-devnet-3
#   supernode: true
#   el_min_mem: 4096
#   el_max_mem: 8192
#   count: 1
- cl_type: lodestar
  cl_image: ethpandaops/lodestar:bal-devnet-3
  el_type: ethrex
  el_image: ethrex:local
  count: 1
ethereum_genesis_generator_params:
  image: ethpandaops/ethereum-genesis-generator:5.3.1
global_log_level: debug
network_params:
  preset: minimal
  seconds_per_slot: 6
  genesis_delay: 30
  fulu_fork_epoch: 0
  gloas_fork_epoch: 2
snooper_enabled: true
dora_params:
  image: ethpandaops/dora:eip7928-support
spamoor_params:
  image: ethpandaops/spamoor:latest
  spammers:
  - scenario: eoatx
    config: {throughput: 15}
  - scenario: evm-fuzz
    config: {throughput: 8}
  - scenario: deploytx
    config:
      throughput: 1
      bytecodes: ''
      gas_limit: 20000000
additional_services: [dora, spamoor]
port_publisher:
  additional_services:
    enabled: true
    public_port_start: 64400


participants:
  - el_type: ethrex
    el_image: ethrex:local
    el_extra_params: ["--syncmode", "full"]
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.0.0-rc.1
    validator_count: 32
    supernode: true
  - el_type: ethrex
    el_image: ethrex:local
    el_extra_params: ["--syncmode", "full"]
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.0.0-rc.1
    validator_count: 32
  - el_type: ethrex
    el_image: ethrex:local
    el_extra_params: ["--syncmode", "full"]
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.0.0-rc.1
    validator_count: 32

network_params:
  seconds_per_slot: 6
  # Activate Osaka from genesis — enables the EIP-8141 frame-tx opcodes
  # (APPROVE 0xAA, TXPARAM 0xB0, FRAMEDATALOAD 0xB1, FRAMEDATACOPY 0xB2).
  fulu_fork_epoch: 0
  # Schedule the post-Glamsterdam fork so the EIP-8141 Hegota gate is satisfied.
  # The ethereum-genesis-generator emits `bogotaTime`/`hezeTime` into the EL
  # genesis JSON, which ethrex parses into `ChainConfig.hegota_time` via its
  # serde aliases. Without this, the Hegota fork gate rejects every frame tx
  # with FrameTxPreFork — this was the gap that forced the earlier Amsterdam
  # fork-gate revert. Ordering mirrors the proven focil.yaml (gloas at 0,
  # heze at 1): frame transactions become valid from epoch 1 onward.
  gloas_fork_epoch: 0
  heze_fork_epoch: 1

additional_services:
  - dora

port_publisher:
  el:
    enabled: true
    public_port_start: 32000
  cl:
    enabled: true
    public_port_start: 33000
  additional_services:
    enabled: true
    public_port_start: 34000

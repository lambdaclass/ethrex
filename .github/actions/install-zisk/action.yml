name: "Install ZisK"
description: "Install ZisK Toolchain"

runs:
  using: "composite"
  steps:
    - name: Install ZisK dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y xz-utils jq curl build-essential qemu-system libomp-dev libgmp-dev nlohmann-json3-dev protobuf-compiler uuid-dev libgrpc++-dev libsecp256k1-dev libsodium-dev libpqxx-dev nasm libopenmpi-dev openmpi-bin openmpi-common libclang-dev clang gcc-riscv64-unknown-elf

    - name: Install ZisK
      shell: bash
      # Must match the `ziskos` tag in both crates/guest-program/Cargo.toml
      # and crates/guest-program/bin/zisk/Cargo.toml.
      env:
        ZISK_VERSION: "1.0.0-alpha"
        # Rust toolchain release tag on github.com/0xPolygonHermez/rust to pin.
        # Kept explicit so CI does not ride the repo's `latest` (see below).
        ZISK_TOOLCHAIN_VERSION: "zisk-1.0.0"
      run: |
        source "$GITHUB_WORKSPACE/.github/scripts/retry.sh"

        mkdir -p "$HOME/.zisk/bin"
        retry curl -fsSL "https://raw.githubusercontent.com/0xPolygonHermez/zisk/v${ZISK_VERSION}/ziskup/ziskup" -o "$HOME/.zisk/bin/ziskup"
        chmod +x "$HOME/.zisk/bin/ziskup"

        # Pin the ZisK Rust toolchain instead of riding `latest`.
        # ziskup runs `cargo-zisk toolchain install` internally, which otherwise
        # downloads from github.com/0xPolygonHermez/rust/releases/latest — a
        # moving target: when upstream publishes a new toolchain, or its
        # freshly-uploaded release asset hasn't propagated on the CDN yet, the
        # download returns a non-gzip payload and the install dies with
        # "gzip: stdin: not in gzip format". We pre-download the pinned tag
        # ourselves (curl -f fails hard + retries on a bad payload) and hand it
        # to cargo-zisk via ZISK_TOOLCHAIN_SOURCE_DIR, which makes it copy our
        # file rather than download. Only the two toolchain targets ZisK
        # publishes are handled; any other host falls back to ziskup's default.
        case "$(uname -s)/$(uname -m)" in
          Linux/x86_64)  ZISK_TOOLCHAIN_TARGET="x86_64-unknown-linux-gnu" ;;
          Darwin/arm64)  ZISK_TOOLCHAIN_TARGET="aarch64-apple-darwin" ;;
          *)             ZISK_TOOLCHAIN_TARGET="" ;;
        esac
        if [ -n "$ZISK_TOOLCHAIN_TARGET" ]; then
          ZISK_TOOLCHAIN_SOURCE_DIR="$HOME/.zisk-toolchain-src"
          mkdir -p "$ZISK_TOOLCHAIN_SOURCE_DIR"
          retry curl -fsSL \
            "https://github.com/0xPolygonHermez/rust/releases/download/${ZISK_TOOLCHAIN_VERSION}/rust-toolchain-${ZISK_TOOLCHAIN_TARGET}.tar.gz" \
            -o "$ZISK_TOOLCHAIN_SOURCE_DIR/rust-toolchain-${ZISK_TOOLCHAIN_TARGET}.tar.gz"
          export ZISK_TOOLCHAIN_SOURCE_DIR
        fi

        retry "$HOME/.zisk/bin/ziskup" -v "${ZISK_VERSION}" -y
        echo "$HOME/.zisk/bin" >> $GITHUB_PATH

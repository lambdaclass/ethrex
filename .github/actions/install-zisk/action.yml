name: "Install ZisK"
description: "Install ZisK Toolchain"

runs:
  using: "composite"
  steps:
    - name: Install ZisK dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y xz-utils jq curl build-essential qemu-system libomp-dev libgmp-dev nlohmann-json3-dev protobuf-compiler uuid-dev libgrpc++-dev libsecp256k1-dev libsodium-dev libpqxx-dev nasm libopenmpi-dev openmpi-bin openmpi-common libclang-dev clang gcc-riscv64-unknown-elf

    - name: Install ZisK
      shell: bash
      # Must match the `ziskos` tag in both crates/guest-program/Cargo.toml
      # and crates/guest-program/bin/zisk/Cargo.toml.
      env:
        ZISK_VERSION: "1.0.0-alpha"
      run: |
        source "$GITHUB_WORKSPACE/.github/scripts/retry.sh"

        mkdir -p "$HOME/.zisk/bin"
        retry curl -fsSL "https://raw.githubusercontent.com/0xPolygonHermez/zisk/v${ZISK_VERSION}/ziskup/ziskup" -o "$HOME/.zisk/bin/ziskup"
        chmod +x "$HOME/.zisk/bin/ziskup"
        # ziskup >= v1.0.0-alpha resolves its install dir from XDG_CONFIG_HOME when set
        # (GitHub runners set it to ~/.config), which would place cargo-zisk outside both
        # the PATH entry below and cargo-zisk's own $HOME/.zisk runtime fallback. Pin the
        # install dir so binaries land in $HOME/.zisk/bin.
        retry env ZISK_DIR="$HOME/.zisk" "$HOME/.zisk/bin/ziskup" -v "${ZISK_VERSION}" -y
        echo "$HOME/.zisk/bin" >> $GITHUB_PATH

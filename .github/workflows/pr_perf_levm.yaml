name: Benchmark LEVM vs REVM

on:
  pull_request:
    branches: ["**"]
    paths:
      - "crates/vm/levm/**"
      - ".github/workflows/pr_perf_levm.yaml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: write

env:
  # Work around frequent libgit2/submodule fetch flakiness in CI.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_NET_RETRY: "10"

jobs:
  benchmark-pr:
    name: Benchmark for PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Rust Environment
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      - name: Build main benchmark
        run: |
          cd crates/vm/levm
          make build-revm-comparison
      - name: Upload main benchmark binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pr-binary
          path: crates/vm/levm/target/release/benchmark

  benchmark-main:
    name: Benchmark for Main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Rust Environment
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      - name: Build main benchmark
        run: |
          cd crates/vm/levm
          make build-revm-comparison
      - name: Upload main benchmark binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: main-binary
          path: crates/vm/levm/target/release/benchmark

  combine-results:
    name: Combine Benchmark Results
    runs-on: ubuntu-latest
    needs: [benchmark-pr, benchmark-main]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install hyperfine
        uses: taiki-e/install-action@7627fb428e65e78e2ec9a24ae5c5bd5f8553f182 # v2
        with:
          tool: hyperfine@1.19

      - name: Install solc
        uses: ./.github/actions/install-solc

      - name: Download PR binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-binary
          path: ./pr

      - name: Download main binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: main-binary
          path: ./main

      - name: Run benchmarks
        run: |
          chmod +x ./main/benchmark
          chmod +x ./pr/benchmark
          cd crates/vm/levm
          make revm-comparison-ci
          bash ../../../.github/scripts/compare_levm_and_revm_benchmarks.sh

      - name: Find comment
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        continue-on-error: true
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "Benchmark Results Comparison"

      - name: Create or update comment
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: result.md
          edit-mode: replace

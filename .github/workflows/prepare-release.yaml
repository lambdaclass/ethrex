# prepare-release.yaml — Automated release branch and RC tag creation.
#
# Purpose:
#   Creates a release branch from a specific commit, bumps version strings
#   across the workspace, updates lockfiles, and pushes a release candidate tag.
#
# Trigger chain:
#   1. Maintainer triggers this workflow with version + commit SHA
#   2. This workflow pushes tag vX.Y.Z-rc.1
#   3. tag_release.yaml (pattern: v*.*.*-*) fires automatically to build
#      binaries, Docker images, and create the GitHub release
#
# Debugging:
#   - If version bump fails: check that CURRENT_VERSION was detected correctly
#     from the workspace Cargo.toml (grep for '^version = ' under [workspace.package])
#   - If lockfile update fails: ensure the Rust toolchain matches rust-toolchain.toml
#   - If push fails: check that the GITHUB_TOKEN has contents:write permission

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in X.Y.Z format (e.g., 9.1.0)"
        required: true
        type: string
      commit_sha:
        description: "Full commit SHA to create the release from"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '$VERSION'. Must be X.Y.Z (e.g., 9.1.0)."
            exit 1
          fi

      - name: Checkout repository at commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0

      - name: Validate commit SHA exists
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          if ! git cat-file -t "$COMMIT_SHA" >/dev/null 2>&1; then
            echo "::error::Commit SHA '$COMMIT_SHA' does not exist in the repository."
            exit 1
          fi

      - name: Check release branch does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --heads origin "release/v$VERSION" | grep -q .; then
            echo "::error::Branch 'release/v$VERSION' already exists."
            exit 1
          fi

      - name: Create release branch
        env:
          VERSION: ${{ inputs.version }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          git checkout -b "release/v$VERSION" "$COMMIT_SHA"

      - name: Detect current version and bump versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Extract current version from the workspace Cargo.toml [workspace.package] section
          CURRENT_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"
          echo "New version: $VERSION"

          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "::error::New version '$VERSION' is the same as the current version."
            exit 1
          fi

          # Bump workspace root Cargo.toml (under [workspace.package])
          sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$VERSION\"/" Cargo.toml

          # Bump guest program Cargo.tomls (standalone workspaces with their own version field)
          for manifest in \
            crates/guest-program/bin/sp1/Cargo.toml \
            crates/guest-program/bin/risc0/Cargo.toml \
            crates/guest-program/bin/zisk/Cargo.toml \
            crates/guest-program/bin/openvm/Cargo.toml \
            crates/l2/tee/quote-gen/Cargo.toml; do
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$VERSION\"/" "$manifest"
          done

          # Bump docs/CLI.md — replace all occurrences of "ethrex OLD" with "ethrex NEW"
          sed -i "s/\"ethrex $CURRENT_VERSION\"/\"ethrex $VERSION\"/g" docs/CLI.md

          # Verify all replacements succeeded
          echo "=== Verification ==="
          grep '^version = ' Cargo.toml | head -1
          for manifest in \
            crates/guest-program/bin/sp1/Cargo.toml \
            crates/guest-program/bin/risc0/Cargo.toml \
            crates/guest-program/bin/zisk/Cargo.toml \
            crates/guest-program/bin/openvm/Cargo.toml \
            crates/l2/tee/quote-gen/Cargo.toml; do
            echo "$manifest: $(grep '^version = ' "$manifest" | head -1)"
          done
          echo "docs/CLI.md occurrences of 'ethrex $VERSION': $(grep -c "\"ethrex $VERSION\"" docs/CLI.md)"

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Update lockfiles
        run: make update-cargo-lock

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bump version to $VERSION"

      - name: Create release candidate tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "v$VERSION-rc.1"

      - name: Push branch and tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git push origin "release/v$VERSION"
          git push origin "v$VERSION-rc.1"

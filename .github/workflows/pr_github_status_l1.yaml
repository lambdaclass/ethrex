name: PR Status

on:
  pull_request:
    types:
      [
        opened,
        reopened,
        synchronize,
        edited,
        ready_for_review,
        converted_to_draft,
      ]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  update-project-status:
    name: Update PR status for ethrex_l1 project
    runs-on: ubuntu-latest
    # sadly pull_request_review doesn't have direct access to labels information so we'll have to check this later.
    if: github.event.pull_request.head.repo.fork == false && (github.event_name == 'pull_request_review' || contains(github.event.pull_request.labels.*.name, 'L1'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.PROJECT_SYNC_APP_ID }}
          private-key: ${{ secrets.PROJECT_SYNC_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update PR status
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const script = require('./.github/scripts/set-pr-status.js');
            await script({github, context});

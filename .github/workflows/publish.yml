name: Publish crates to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List package contents only, do not publish"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-release-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@11df97af8e8102fd60b60a77dfbf58d40cd843b8 # v1.10.1
        with:
          toolchain: stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          # Topological order: each crate is published after all of its dependencies.
          CRATES=(
            ethrex-rlp
            ethrex-crypto
            ethrex-sdk-contract-utils
            ethrex-trie
            ethrex-common
            ethrex-metrics
            ethrex-levm
            ethrex-l2-common
            ethrex-storage
            ethrex-vm
            ethrex-storage-rollup
            ethrex-blockchain
            ethrex-p2p
            ethrex-rpc
            ethrex-l2-rpc
            ethrex-sdk
          )
          for c in "${CRATES[@]}"; do
            echo "::group::$c"
            if [ "${DRY_RUN:-false}" = "true" ]; then
              cargo package -p "$c" --no-verify --list
            else
              OUTPUT=$(cargo publish -p "$c" 2>&1) || {
                echo "$OUTPUT"
                if echo "$OUTPUT" | grep -q "already exists"; then
                  echo "$c already published, skipping"
                  echo "::endgroup::"
                  continue
                fi
                exit 1
              }
              # cargo >=1.66 blocks until the version is in the index;
              # a short settle covers any registry propagation lag.
              sleep 20
            fi
            echo "::endgroup::"
          done

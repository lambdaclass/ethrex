name: Build Desktop App

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/desktop-app/ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: crates/desktop-app/ui/src-tauri -> target

      - name: Import Apple certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: crates/desktop-app/ui

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/desktop-app/ui
          args: --target ${{ matrix.target }}

      - name: Codesign native node modules in bundle (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH=$(find crates/desktop-app/ui/src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then echo "No .app found"; exit 0; fi
          echo "Signing native modules in: $APP_PATH"
          # Sign all .node native addons (e.g. better-sqlite3)
          find "$APP_PATH/Contents/Resources" -name "*.node" -type f | while read f; do
            echo "  Signing: $f"
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$f"
          done
          # Re-sign the entire app to update the seal
          codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options runtime "$APP_PATH"
          echo "Done. Re-creating DMG..."
          # Re-create DMG with the re-signed app
          DMG_PATH=$(find crates/desktop-app/ui/src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" -maxdepth 1 | head -1)
          if [ -n "$DMG_PATH" ]; then
            VOLUME_NAME=$(basename "$APP_PATH" .app)
            hdiutil create -volname "$VOLUME_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokamak-appchain-${{ matrix.label }}
          path: |
            crates/desktop-app/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            crates/desktop-app/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            crates/desktop-app/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            crates/desktop-app/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe

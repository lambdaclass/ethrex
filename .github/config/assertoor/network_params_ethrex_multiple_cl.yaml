# ethereum-package's el_admin_node_info.star bootstrap calls admin_nodeInfo
# to discover the enode; the new ethrex defaults only serve eth/net/web3, so
# every ethrex participant opts admin/debug/txpool back in for this devnet.
participants:
  - el_type: ethrex
    el_image: ethrex:ci
    cl_type: lighthouse
    cl_image: sigp/lighthouse:v8.0.0-rc.1
    validator_count: 32
    ethereum_metrics_exporter_enabled: true
    el_extra_params:
      - "--http.addr=0.0.0.0"
      - "--http.api=eth,net,web3,debug,admin,txpool"
  - el_type: ethrex
    el_image: ethrex:ci
    cl_type: teku
    cl_image: consensys/teku:25.6.0
    validator_count: 32
    ethereum_metrics_exporter_enabled: true
    el_extra_params:
      - "--http.addr=0.0.0.0"
      - "--http.api=eth,net,web3,debug,admin,txpool"
  - el_type: ethrex
    el_image: ethrex:ci
    cl_type: prysm
    cl_image: gcr.io/offchainlabs/prysm/beacon-chain:v6.0.4
    validator_count: 32
    ethereum_metrics_exporter_enabled: true
    el_extra_params:
      - "--http.addr=0.0.0.0"
      - "--http.api=eth,net,web3,debug,admin,txpool"

network_params:
  # The address of the staking contract address on the Eth1 chain
  deposit_contract_address: "0x4242424242424242424242424242424242424242"
  seconds_per_slot: 3

additional_services:
  - assertoor
  - dora

assertoor_params:
  image: ethpandaops/assertoor:v0.0.17
  tests:
    - https://raw.githubusercontent.com/lambdaclass/ethrex/refs/heads/main/.github/config/assertoor/el-stability-check.yaml # Check that all el clients are synced with the corresponding cl
    - https://raw.githubusercontent.com/ethpandaops/assertoor/c35b5c3a5fd543bcc843ee0e0af1e6255ca48dbd/playbooks/stable/blob-transactions-test.yaml
    - https://raw.githubusercontent.com/ethpandaops/assertoor/c35b5c3a5fd543bcc843ee0e0af1e6255ca48dbd/playbooks/stable/eoa-transactions-test.yaml
